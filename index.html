<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWSD Report</title>
    <script src="https://cdn.jsdelivr.net/npm/powerbi-client@2.23.1/dist/powerbi.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f0f2f5; }
        #loading {
            display: flex; align-items: center; justify-content: center;
            height: 100vh; font-size: 18px; color: #555; font-family: Arial;
        }
        #reportContainer { width: 100%; height: 100vh; display: none; }
    </style>
</head>
<body>
    <div id="loading">Loading report...</div>
    <div id="reportContainer"></div>

    <script>
        fetch('token.json')
            .then(r => r.json())
            .then(data => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('reportContainer').style.display = 'block';
                powerbi.embed(document.getElementById('reportContainer'), {
                    type: 'report',
                    id: data.reportId,
                    embedUrl: data.embedUrl,
                    accessToken: data.token,
                    tokenType: models.TokenType.Embed,
                    settings: {
                        panes: {
                            filters: { visible: true },
                            pageNavigation: { visible: true }
                        }
                    }
                });
            })
            .catch(err => {
                document.getElementById('loading').textContent = 'Error loading report: ' + err.message;
            });
    </script>
</body>
</html>
