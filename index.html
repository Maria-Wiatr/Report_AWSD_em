<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWSD Report</title>
    <script src="https://cdn.jsdelivr.net/npm/powerbi-client@2.23.1/dist/powerbi.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f0f2f5; }
        #loading {
            display: flex; align-items: center; justify-content: center;
            height: 100vh; font-size: 18px; color: #555; font-family: Arial;
        }
        #reportContainer { width: 100%; height: 100vh; display: none; }
    </style>
</head>
<body>
    <div id="loading">Loading report...</div>
    <div id="reportContainer"></div>

    <script>
        fetch('https://pbi-token-worker.20240405.workers.dev')
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (!data.token) {
                    document.getElementById('loading').textContent = 'Token not ready — refresh in 1 minute.';
                    return;
                }
                document.getElementById('loading').style.display = 'none';
                document.getElementById('reportContainer').style.display = 'block';
                powerbi.embed(document.getElementById('reportContainer'), {
                    type: 'report',
                    id: data.reportId,
                    embedUrl: data.embedUrl,
                    accessToken: data.token,
                    tokenType: 1,
                    pageName: '581caddeb2356a4c234a',
                    settings: {
                        panes: {
                            filters: { visible: false },
                            pageNavigation: { visible: true }
                        }
                    }
                });
            })
            .catch(function(err) {
                document.getElementById('loading').textContent = 'Error: ' + err.message;
            });
    </script>
</body>
</html>
